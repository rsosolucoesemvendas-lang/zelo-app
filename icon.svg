<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo escuro cheio, sem borda branca. O sistema arredonda os cantos automaticamente. -->
  <rect width="512" height="512" fill="#0F0720"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F43F5E"/>
      <stop offset="0.5" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>
  <!-- Logo ampliada (scale 4x) e centralizada -->
  <g transform="translate(16, 16) scale(4)">
    <path d="M 26 32 Q 60 22, 94 32 Q 76 46, 66 55" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 54 65 Q 44 74, 26 88 Q 60 98, 94 88" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="60" r="10" fill="#FCD34D"/>
    <text x="60" y="60" text-anchor="middle" dominant-baseline="central" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="13" fill="#0F0720">$</text>
  </g>
</svg>
